version: '3.9'

networks:
  pandora-net:
    driver: bridge

services:
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: pandora-backend
    image: pandora-backend:latest
    ports:
      - "8000:8000"
    environment:
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:-}
      - FIREWORKS_API_KEY=${FIREWORKS_API_KEY:-}
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    networks:
      - pandora-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M

  frontend:
    build:
      context: .
      dockerfile: ./apps/frontend/Dockerfile
    container_name: pandora-frontend
    image: pandora-frontend:latest
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - pandora-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
